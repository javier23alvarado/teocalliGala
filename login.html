<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Iniciar Sesión | Compañía Teocalli</title>
  <meta name="description" content="Portal de acceso administrativo del Ballet Folclórico Compañía Teocalli.">
  <link rel="stylesheet" href="style.css">
</head>
<body style="background: radial-gradient(circle at 50% 50%, rgba(209, 26, 91, 0.08) 0%, var(--bg-site) 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px;">

  <div class="login-card">
    <div class="login-header">
      <a href="/" style="display: inline-block; text-decoration: none; margin-bottom: 12px;">
        <svg class="login-logo" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" style="width: 52px; height: 52px;">
          <path d="M12 2L14.39 6.83L19.7 7.6L15.85 11.35L16.76 16.64L12 14.14L7.24 16.64L8.15 11.35L4.3 7.6L9.61 6.83L12 2Z" fill="#D11A5B"/>
        </svg>
      </a>
      <h2 class="login-title text-serif">Acceso Compañía</h2>
      <p class="login-subtitle">Ingresa para acceder a tu panel de control</p>
    </div>
    
    <!-- Alertas de Feedback -->
    <div id="login-alert" class="alert"></div>

    <form id="login-form">
      <div class="form-group">
        <label class="form-label" for="login-email">Correo Electrónico</label>
        <input type="email" id="login-email" class="form-input" required placeholder="correo@ejemplo.com">
      </div>
      <div class="form-group">
        <label class="form-label" for="login-password">Contraseña</label>
        <input type="password" id="login-password" class="form-input" required placeholder="••••••••">
      </div>
      <button type="submit" class="btn btn-primary btn-block" id="btn-login-submit" style="margin-top: 10px;">Ingresar</button>
    </form>
    
    <div class="login-back-btn">
      <a href="/">&larr; Volver al sitio principal</a>
    </div>
  </div>

  <!-- Loading Overlay -->
  <div id="loading-overlay" style="display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background-color: rgba(253, 251, 247, 0.7); backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px); z-index: 9999; align-items: center; justify-content: center; flex-direction: column; gap: 16px;">
    <div style="width: 48px; height: 48px; border: 4px solid var(--primary-light); border-top-color: var(--primary); border-radius: 999px; animation: spin 1s linear infinite;"></div>
    <span style="font-weight: 600; color: var(--primary);">Cargando...</span>
  </div>

  <style>
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>

  <!-- Lógica modular de Login -->
  <script type="module" src="login.js"></script>
</body>
</html>
